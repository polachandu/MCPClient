spring:
  application:
    name: mcp

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json


logging:
  pattern:
    console: '%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n'
  level:
    org.springframework.ai.chat.client.advisor: DEBUG   # enables SimpleLoggerAdvisor output
    org.springframework.ai.mcp: DEBUG                   # enables MCP tool call tracing
